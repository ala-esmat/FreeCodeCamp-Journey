<body>
    <h2>SpiderPhotoApp</h2>
    <main>
        <h3>Spider Photos</h3>
        <!-- TODO: Add link to spider photo -->
        <p>click here to see more <a href="https://www.pexels.com/search/spider/">Spider Photos.</a></p>

        <a href="Photo by Average GUY from Pexels: https://www.pexels.com/photo/close-up-of-a-garden-spider-on-its-web-28435054/"
            target="_blank"><img src="img/istockphoto-spider-2-612x612.jpg" alt="cool-spider" width="400px">
        </a>
        <div>
            <h3>Spiders lists:</h3>
            <p>Things Spiders <em>Love</em>:</p>
            <ul>
                <li>Insects</li>
                <li>Web Spinning</li>
                <li>Dark Places</li>
            </ul>
            <img src="/img/pexels-pixabay-spider-3.jpg" alt="Spider Web" width="400px">
            <p>Things Spiders <strong>hate</strong>:</p>
            <ol>
                <li>Brooms</li>
                <li>Bright Lights</li>
                <li>Heavy Rain</li>
            </ol>
            <img src="/img/pexels-pixabay-spider-4.jpg" alt="Spiders" width="400">
        </div>
        <form action="">
            <label for="outdoor"><input type="radio" id="outdoor" name="indoor-outdoor" checked>outdoor</label><br>
            <label for="indoor"><input type="radio" id="indoor" name="indoor-outdoor">indoor</label><br>

            <label for="Web"><input id="Web" type="checkbox" checked>Web-master</label><br>
            <label for="Creepy"><input id="Creepy" type="checkbox">Creepy</label><br>
            <label for="Active"><input id="Active" type="checkbox">Active</label><br>
            <label for="">Writing Your Message :</label>

            <button type="submit">Submit</button>
